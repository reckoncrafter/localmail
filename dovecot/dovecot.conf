dovecot_config_version = 2.4.3
dovecot_storage_version = 2.4.3
protocols = imap lmtp
listen = *
log_path = /var/log/dovecot.log

mail_home = /var/mail/%{user | username}
mail_uid = 5000
mail_gid = 5000
mail_driver = maildir
mail_path = ~/Maildir

auth_allow_cleartext = yes
auth_mechanisms = plain login

ssl = no

base_dir = "/run/dovecot"

userdb static {
    allow_all_users = yes
    fields {
        uid = 5000
        gid = 5000
        home = /var/mail/%{user | username}
    }
}

passdb static {
    password = secure_password
    # fields {
    #     proxy = yes
    #     host = 127.0.0.1
    # }
}

service lmtp {
    unix_listener lmtp {
        mode = 0666
        user = vmail
        group = vmail
    }
}

service doveadm {
    unix_listener doveadm {
        mode = 0600
        user = root
    }
}