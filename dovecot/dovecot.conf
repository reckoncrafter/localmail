dovecot_config_version = 2.4.3
dovecot_storage_version = 2.4.3
protocols = imap lmtp submission
listen = *

log_path = /var/log/dovecot.log
auth_verbose = yes
auth_debug = yes
mail_debug = yes

mail_home = /var/mail/%{user | username}
mail_uid = 5000
mail_gid = 5000
mail_driver = maildir
mail_path = ~/Maildir

# auth_allow_cleartext = yes
auth_mechanisms = plain login

ssl = yes
login_trusted_networks = 127.0.0.1

base_dir = "/run/dovecot"

ssl_server_cert_file = /run/secrets/certificate.pem
ssl_server_key_file = /run/secrets/privatekey.pem
ssl = required

userdb passwd-file {
    auth_username_format = %{user | username}
    passwd_file_path = /var/dovecot/passwd
    fields {
        uid:default = 5000
        gid:default = 5000
        home:default = /var/mail/%{user} 
    }
}

passdb passwd-file {
    auth_username_format = %{user | username}
    passwd_file_path = /var/dovecot/passwd
}

service lmtp {
    #postmaster_address = "bounce@mail.local"

    unix_listener lmtp {
        mode = 0666
        user = vmail
        group = vmail
    }
}

service doveadm {
    unix_listener doveadm {
        mode = 0600
        user = root
    }
}

protocol submission {
    submission_relay_host = 127.0.0.1
    submission_relay_port = 25
    submission_relay_trusted = yes
    rawlog_dir = /var/log/rawlog
    submission_relay_rawlog_dir = /var/log/rawlog/relay
    submission_client_workarounds = whitespace-before-path
}